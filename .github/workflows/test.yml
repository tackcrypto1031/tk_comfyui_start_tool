name: Tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  windows-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov pyyaml psutil GitPython
          # Best-effort: if pyproject.toml defines deps, install in editable mode
          if [ -f pyproject.toml ]; then pip install -e . || true; fi

      - name: Run tests
        shell: bash
        run: pytest --cov=src --cov-report=term-missing -v

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore
